services:
  dependably:
    build:
      context: .
      args:
        REGISTRY_URL: ${REGISTRY_URL:-}
      # The private-registry credential is a BuildKit secret, not a build arg —
      # build args persist in image history; secret mounts do not. The secret
      # resolves from the REGISTRY_KEY environment variable (empty when unset,
      # which the Dockerfile treats as "no private registry").
      secrets:
        - registry_key
    ports:
      - "8080:8080"
    volumes:
      - dependably-data:/data
    environment:
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      DEFAULT_ORG_SLUG: ${DEFAULT_ORG_SLUG:-default}
      # Single-tenant appliance by default. Set DEPLOYMENT_MODE=multi for
      # subdomain-routed multi-tenancy — that mode also requires APEX_HOST and
      # per-tenant access via slug.apexhost (a bare host resolves to apex and
      # hides per-tenant login methods such as SAML).
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-single}
      # RPM upstream proxy. There is no canonical default RPM repo (distro/release
      # specific), so this is opt-in via env — here the demo points at Fedora 40
      # (archived tree, matching the fedora:40 integration-test fixture).
      Rpm__Upstream: ${RPM_UPSTREAM:-https://archives.fedoraproject.org/pub/archive/fedora/linux/releases/40/Everything/x86_64/os}
      Rpm__UpstreamMode: ${RPM_UPSTREAM_MODE:-passthrough}
      # Memory guardrails for containers (set DOTNET_GCHeapHardLimit to ~75% of mem_limit)
      # - DOTNET_GCHeapHardLimit=0xC0000000
      # - STAGING_DISK_WARN_THRESHOLD_PERCENT=10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  dependably-data:

secrets:
  registry_key:
    environment: REGISTRY_KEY
