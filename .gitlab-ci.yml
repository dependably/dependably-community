# Signal-only — not in release-gate.needs. allow_failure: true is intentional;
# scan results inform Sonar dashboards but don't gate the release.
#
# Main + tag only. SonarQube Community Edition rejects sonar.pullrequest.*
# ("Developer Edition or above is required"), so running on merge_request_event
# either fails (with the PR-decoration args) or pollutes the main branch's
# analysis (without them, the feature-branch source gets stored against the
# project's default branch). Until the server is upgraded, MR coverage is out
# of reach; rather than ship noise, scope sonar to post-merge.
sonarqube-check:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci-main]
  image: ${DEP_IMAGE_REGISTRY}/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  needs: [frontend-tests]
  tags: [amd64]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - apt-get update
    - apt-get install --yes --no-install-recommends openjdk-17-jre-headless nodejs
    - dotnet tool install --global dotnet-sonarscanner
    - export PATH="$PATH:$HOME/.dotnet/tools"
    # The token is passed explicitly via /d:sonar.token — the SONAR_TOKEN environment
    # variable alone is NOT honored by the scanner's begin step against this SonarQube
    # 9.9 server (pre-processing fails with "Authentication with the server has failed").
    # This is safe for the job trace: GitLab echoes script lines unexpanded (the literal
    # text $SONAR_TOKEN), so the value never appears in the log regardless of variable
    # masking. SONAR_TOKEN must still be a masked CI/CD variable (see CONTRIBUTING >
    # SonarQube (CI)).
    # SonarQube 9.9 LTS's C# plugin v8.51 does NOT trigger the "C# Tests Coverage Report
    # Import" sensor on `sonar.cs.cobertura.reportsPaths` in this stack — last scan log
    # showed the cobertura file present + path-correct + the property set, yet the sensor
    # never ran and "Zero Coverage Sensor" stamped every file at 0/N. OpenCover is the
    # historically-preferred C# format for SonarQube and the sensor for it (sonar.cs.
    # opencover.reportsPaths) is rock-solid. ReportGenerator converts cobertura → OpenCover.
    - >
      dotnet sonarscanner begin
      /k:"$SONAR_PROJECT_KEY"
      /d:sonar.token="$SONAR_TOKEN"
      /d:sonar.host.url="$SONAR_HOST_URL"
      /d:sonar.cs.opencover.reportsPaths="test-results/opencover.xml"
      /d:sonar.cs.vstest.reportsPaths="test-results/tests.trx"
      /d:sonar.javascript.lcov.reportPaths="web/coverage/lcov.info"
      /d:sonar.coverage.exclusions="src/Dependably/Program.cs,src/Dependably/Infrastructure/Schema*.sql,src/Dependably/Infrastructure/Redis/**/*.cs,src/Dependably/Infrastructure/RedisLockoutStore.cs,src/Dependably/Infrastructure/NpgsqlMetadataStore.cs,src/Dependably/Storage/AzureBlobContainerAdapter.cs,src/Dependably/Infrastructure/SpdxLicenseRepository.cs,web/src/main.js,web/src/App.svelte,web/src/locales/**,web/.stylelintrc.cjs,web/svelte.config.js,web/vite.config.js,web/vitest.config.js,web/eslint.config.js,build/extract-notices.mjs,i18n/scripts/i18n-validate.js"
      /d:sonar.exclusions="web/e2e/**"
      /d:sonar.test.inclusions="**/*Tests.cs,**/*.test.js,**/*.spec.js,**/*.spec.ts"
      /d:sonar.issue.ignore.multicriteria="e1"
      /d:sonar.issue.ignore.multicriteria.e1.ruleKey="csharpsquid:S5332"
      /d:sonar.issue.ignore.multicriteria.e1.resourceKey="**/RpmRepodataService.cs"
    - dotnet build
    - dotnet test --filter "Category!=Integration&Category!=ApiContract&Category!=SchemaPostgres" --settings coverlet.runsettings --collect:"XPlat Code Coverage" --logger "trx;LogFileName=tests.trx" --results-directory ./test-results
    # coverlet.collector now emits opencover (per coverlet.runsettings <Format>opencover</Format>)
    # at test-results/<guid>/coverage.opencover.xml. Move to a deterministic path so the
    # scanner config can point at a literal filename.
    - find test-results -name 'coverage.opencover.xml' -exec mv -f {} test-results/opencover.xml \;
    - echo "=== artifacts SonarScanner is about to ingest ==="
    - ls -la test-results/opencover.xml test-results/tests.trx web/coverage/lcov.info
    - echo "--- opencover header ---"
    - head -10 test-results/opencover.xml
    - dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
  allow_failure: true

snyk-code:
  # Snyk Code (SAST) gate: fails only on findings absent from ci/snyk-code-baseline.json
  # (see CONTRIBUTING > Static analysis (Snyk Code)). Gating (allow_failure: false): a finding
  # not on the baseline fails the pipeline and blocks the merge. A genuine new FP gets an inline
  # // deepcode ignore at the site + ci/snyk-code-scan.sh --update committed in the same MR.
  # SNYK_TOKEN must be an UNPROTECTED, masked CI/CD variable — merge-request pipelines run on
  # unprotected branches, so a protected token would be absent there and every MR scan errors.
  stage: test
  extends: [.runs-on-ci]
  image:
    name: ${DEP_IMAGE_REGISTRY}/snyk/snyk:linux@sha256:aeb296d943659dccbc7464340bb8741f6e11999cd99644dc92e6d315d6eda3f4
    entrypoint: [""]
  before_script:
    - command -v jq >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends jq; }
  script:
    - ci/snyk-code-scan.sh
  allow_failure: false

# Boots the real published binary and runs the external dependably-integration-tests suite
# against it. Background jobs that make outbound internet calls at startup (vuln-scan,
# vuln-rescan, deprecation-refresh, threat-feed) are disabled via DISABLE_BACKGROUND_JOBS
# so the runner needs no boot-time egress — but ASPNETCORE_ENVIRONMENT is left at Production
# and AIR_GAPPED is NOT set, so request-time proxy passthrough to upstream registries
# remains fully operational. The suite exercises proxy/upstream code paths that need
# real network.
#
# allow_failure: true holds until the external suite is proven green against this job.
# A follow-up will promote it to .release-required and add it to release-gate.needs.
integration-external:
  stage: test
  extends: [.private-registry-setup]
  # Opt-in: stays skipped (not failed) until the dependably-integration-tests repo
  # allowlists this project for CI_JOB_TOKEN (Settings → CI/CD → Job token
  # permissions) and the suite implements the env contract below. Set
  # RUN_EXTERNAL_INTEGRATION=true (project CI/CD variable) to enable; drop
  # allow_failure and promote to .release-required once it is reliably green.
  rules:
    - if: '$RUN_EXTERNAL_INTEGRATION != "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - *release-tag-rule
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  needs: [build]
  tags: [amd64]
  allow_failure: true
  variables:
    INTEGRATION_TESTS_REF: "main"
  script:
    # --- inline app boot (mirrors .zap_app_boot but with background jobs disabled) ---
    # AIR_GAPPED is intentionally NOT set so proxy passthrough remains live.
    - mkdir -p /tmp/ext-int/blobs
    - export DB_PATH=/tmp/ext-int/dependably.db
    - export LOCAL_STORAGE_PATH=/tmp/ext-int/blobs
    - export STORAGE_BACKEND=local
    - export ASPNETCORE_URLS=http://+:8080
    - export FIRST_BOOT_ADMIN_PASSWORD="$DAST_ADMIN_PASSWORD"
    - export LOGIN_RATE_LIMIT_PERMITS=100000
    - export TOKEN_CREATE_RATE_LIMIT_PERMITS=100000
    # Disable the three RunOnStartup services that make outbound internet calls at boot
    # (OsvVulnScanService, DeprecationRefreshService, ThreatFeedService). Proxy
    # request-time passthrough to upstream registries is unaffected.
    # OSV stays in default remote mode (never invoked — vuln-scan is disabled), so
    # no OSV_LOCAL_PATH is required; AIR_GAPPED/OSV_MODE=local would crash the boot.
    - export DISABLE_BACKGROUND_JOBS=vuln-scan,vuln-rescan,deprecation-refresh,threat-feed
    - cp -r src/Dependably/bin/Release/net10.0/linux-x64/publish /tmp/ext-int/app
    - chmod +x /tmp/ext-int/app/Dependably
    - /tmp/ext-int/app/Dependably > /tmp/ext-int/app.log 2>&1 &
    - APP_PID=$!
    - |
      for i in $(seq 1 60); do
        if curl -fsS http://localhost:8080/ready > /dev/null 2>&1; then
          echo "App ready after ${i}s"
          break
        fi
        if ! kill -0 "$APP_PID" 2>/dev/null; then
          echo "App died during startup — log follows:" >&2
          cat /tmp/ext-int/app.log >&2
          exit 1
        fi
        sleep 1
      done
      curl -fsS http://localhost:8080/ready || { echo "App not ready after 60s — log follows:" >&2; cat /tmp/ext-int/app.log >&2; exit 1; }
    # --- clone and run the external suite ---
    - export DEPENDABLY_BASE_URL=http://localhost:8080
    - export DEPENDABLY_ADMIN_EMAIL=admin@dependably.local
    - export DEPENDABLY_ADMIN_PASSWORD="$DAST_ADMIN_PASSWORD"
    # Clone the external suite from this project's own self-hosted GitLab. The
    # CI_JOB_TOKEN is sent as an Authorization header rather than embedded in the
    # remote URL, so it never lands in .git/config or the process argv.
    - | # glsec:ignore GL004 -- gitlab.northwardlabs.ca is this project's own self-hosted GitLab; CI_JOB_TOKEN is a first-party credential
      AUTH_B64=$(printf 'gitlab-ci-token:%s' "$CI_JOB_TOKEN" | base64 | tr -d '\n')
      git -c http.extraHeader="Authorization: Basic ${AUTH_B64}" clone --depth 1 --branch "$INTEGRATION_TESTS_REF" "https://gitlab.northwardlabs.ca/moonlitlabs/dependably-integration-tests.git" /tmp/integration-tests
    # .private-registry-setup writes nuget.config to $CI_PROJECT_DIR (not $HOME), so
    # dotnet restore inside the cloned suite — running from /tmp/integration-tests —
    # would fall back to public nuget.org. Copy the generated config into the clone
    # directory so all NuGet restores in the suite target the private feed.
    - cp "$CI_PROJECT_DIR/nuget.config" /tmp/integration-tests/
    - mkdir -p "$CI_PROJECT_DIR/test-results"
    - cd /tmp/integration-tests
    - dotnet test --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results/integration-external.xml"
  after_script:
    - echo "=== dependably app log ==="; cat /tmp/ext-int/app.log || true
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit: test-results/integration-external.xml
    paths:
      - test-results/

# === sbom ===

sbom-backend:
  stage: sbom
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: ${DEP_IMAGE_REGISTRY}/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  script:
    - dotnet tool restore
    - dotnet CycloneDX src/Dependably/Dependably.csproj -o . -fn sbom-backend.json -F json -spv 1.6 --exclude-dev
  artifacts:
    paths:
      - sbom-backend.json
    expire_in: 30 days

sbom-frontend:
  stage: sbom
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: ${DEP_IMAGE_REGISTRY}/library/node:22-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
  script:
    - cd web && npm ci && npm run sbom
  artifacts:
    paths:
      - web/sbom-frontend.json
    expire_in: 30 days

dt-publish:
  stage: sbom
  extends: [.runs-on-ci-main, .release-required]
  image: ${DEP_IMAGE_REGISTRY}/library/alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  needs:
    - job: sbom-backend
      artifacts: true
    - job: sbom-frontend
      artifacts: true
  variables:
    DT_PARENT_NAME: "Dependably Community"
    DT_VERSION: "latest"
  script:
    - apk add --no-cache curl
    - | # glsec:ignore GL020 -- curl POSTs SBOM files to the DT API; no executable is downloaded
      set -eu
      AUTH="X-Api-Key: $dependencyTrack_token"
      BASE="${dependencyTrack_url%/}"

      status=$(curl -sS -o /tmp/parent.out -w '%{http_code}' \
        -X PUT "$BASE/api/v1/project" \
        -H "$AUTH" -H 'Content-Type: application/json' \
        -d "{\"name\":\"$DT_PARENT_NAME\",\"version\":\"$DT_VERSION\"}")
      case "$status" in
        201|409) echo "Parent ready (HTTP $status)";;
        *) echo "Parent bootstrap failed (HTTP $status):" >&2; cat /tmp/parent.out >&2; exit 1;;
      esac

      upload() {
        child="$1"; file="$2"
        echo "Publishing $child from $file"
        status=$(curl -sS -o /tmp/bom.out -w '%{http_code}' \
          -X POST "$BASE/api/v1/bom" \
          -H "$AUTH" \
          -F "autoCreate=true" \
          -F "projectName=$child" \
          -F "projectVersion=$DT_VERSION" \
          -F "parentName=$DT_PARENT_NAME" \
          -F "parentVersion=$DT_VERSION" \
          -F "bom=@$file")
        case "$status" in
          200) echo "  uploaded";;
          *) echo "  upload failed (HTTP $status):" >&2; cat /tmp/bom.out >&2; exit 1;;
        esac
      }
      upload backend  sbom-backend.json
      upload frontend web/sbom-frontend.json

# === ai-review ===

# Advisory LLM review of the MR diff against a local Ollama instance. Signal-only
# (allow_failure: true), MR-only, and deliberately NOT .release-required —
# non-deterministic model output must never gate a release (mirrors zap-full /
# sonarqube-check). Each concrete job supplies a persona prompt file + a report
# name; all diff/curl/jq/report/comment logic lives in ci/ai-review.sh so the
# jobs don't duplicate it. resource_group serializes the four jobs so a single
# local model isn't hit by four concurrent 30B requests.
.ai-review:
  stage: ai-review
  image: ${DEP_IMAGE_REGISTRY}/library/alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  # MR-only: the diff and the MR to comment on only exist on a merge_request
  # pipeline. Inline rules are safe here because these jobs do NOT extend
  # .release-required, so release-contract-lint's "no inline rules" guard
  # (which only inspects required jobs) does not apply.
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # No `needs:` — run in stage order (after sbom), so the model only reviews an
  # MR whose build/test/sbom already passed instead of racing ahead at t=0.
  resource_group: ai-review
  interruptible: true
  timeout: 20 minutes
  variables:
    # Defaults; override via project CI/CD variables without editing YAML.
    OLLAMA_URL: "http://192.168.2.25:11434" # glsec:ignore GL016 -- Ollama runs on a private LAN address; TLS is not available there
    # 26B MoE (a4b => ~4B active params): same per-call latency as the 12B dense
    # model on this host but stronger review quality. The earlier no-content failure
    # at this size was the reasoning-budget bug now fixed by AI_REVIEW_THINK=false.
    OLLAMA_MODEL: "gemma4:26b-a4b-it-qat"
    GIT_DEPTH: "20"
    AI_REVIEW_MAX_DIFF_BYTES: "120000"
    # Must hold the ~35K-token prompt a 120000-byte diff produces plus generation
    # room; at 16384 the prompt filled the window and the model returned no content.
    AI_REVIEW_NUM_CTX: "49152"
    # gemma4:* is a reasoning model; thinking burns the generation budget before any
    # answer is written. Off => the model writes the review straight to content.
    AI_REVIEW_THINK: "false"
  allow_failure: true
  before_script:
    - apk add --no-cache bash curl jq git
  script:
    - bash ci/ai-review.sh "$AI_REVIEW_PERSONA_FILE" "$AI_REVIEW_REPORT_FILE"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - "$AI_REVIEW_REPORT_FILE"

ai-review-security:
  extends: .ai-review
  variables:
    AI_REVIEW_PERSONA_FILE: "ci/prompts/security.md"
    AI_REVIEW_REPORT_FILE: "ai-security-review.md"
    AI_REVIEW_LABEL: "Security"

ai-review-code:
  extends: .ai-review
  variables:
    AI_REVIEW_PERSONA_FILE: "ci/prompts/code.md"
    AI_REVIEW_REPORT_FILE: "ai-code-review.md"
    AI_REVIEW_LABEL: "Code Quality"

ai-review-architecture:
  extends: .ai-review
  variables:
    AI_REVIEW_PERSONA_FILE: "ci/prompts/architecture.md"
    AI_REVIEW_REPORT_FILE: "ai-architecture-review.md"
    AI_REVIEW_LABEL: "Architecture"

ai-review-docs:
  extends: .ai-review
  variables:
