    AI_REVIEW_REPORT_FILE: "ai-docs-review.md"
    AI_REVIEW_LABEL: "Documentation"

# === dast ===

# Shared app-boot for every DAST job and e2e: copies the published binary, boots
# it on :8080 with a throwaway DB/blob store, and waits on /ready (aborting if
# the process dies). Mirrors the Playwright CI webServer pattern in
# web/e2e/playwright.config.ts: same binary path, same env-var shape, same gate.
# DISABLE_BACKGROUND_JOBS turns off the three RunOnStartup refresh services that
# make outbound calls on every boot (vuln-scan/-rescan, deprecation-refresh →
# npmjs/pypi, threat-feed → cisa.gov + first.org). OSV stays in default remote
# mode but is never invoked, so no OSV_LOCAL_PATH is required.
.app_boot: &app_boot |
  mkdir -p /tmp/dast/blobs
  export DB_PATH=/tmp/dast/dependably.db
  export LOCAL_STORAGE_PATH=/tmp/dast/blobs
  export STORAGE_BACKEND=local
  export ASPNETCORE_URLS=http://+:8080
  export FIRST_BOOT_ADMIN_PASSWORD="$DAST_ADMIN_PASSWORD"
  export LOGIN_RATE_LIMIT_PERMITS=100000
  export TOKEN_CREATE_RATE_LIMIT_PERMITS=100000
  export DISABLE_BACKGROUND_JOBS=vuln-scan,vuln-rescan,deprecation-refresh,threat-feed
  cp -r src/Dependably/bin/Release/net10.0/linux-x64/publish /tmp/dast/app
  chmod +x /tmp/dast/app/Dependably
  /tmp/dast/app/Dependably > app.log 2>&1 &
  APP_PID=$!
  for i in $(seq 1 60); do
    if curl -fsS http://localhost:8080/ready > /dev/null 2>&1; then
      echo "App ready after ${i}s"
      break
    fi
    if ! kill -0 "$APP_PID" 2>/dev/null; then
      echo "App died during startup — log follows:" >&2
      cat app.log >&2
      exit 1
    fi
    sleep 1
  done
  curl -fsS http://localhost:8080/ready || { echo "App not ready after 60s — log follows:" >&2; cat app.log >&2; exit 1; }

# Passive-only baseline scan — fast enough to gate every MR, and the one DAST
# job in the release contract (.release-required). Accepted passive noise is
# enumerated in .zap/baseline.conf; -I is NOT passed, so a new, unaccepted
# finding (a dropped security header, a real passive vuln) turns the pipeline
# red. Triage a genuine new finding into .zap/baseline.conf to re-green.
zap-baseline:
  stage: dast
  extends: [.runs-on-ci, .release-required]
  image:
    name: ${DEP_IMAGE_REGISTRY}/zaproxy/zap-stable:2.17.0@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074
    entrypoint: [""]
  needs: [build]
  # ZAP image is multi-arch; on a Pi runner Docker pulls the native arm64 variant
  # and the x64 Dependably binary fails with "Exec format error". Pin to amd64
  # runners so the published binary executes natively.
  tags: [amd64]
  script:
    - *app_boot
    # ZAP scripts hardcode base_dir='/zap/wrk/' for report output, but the image
    # ships without that directory (it's the conventional bind-mount target).
    # Symlink it to $PWD so .zap/*.conf is in place and -J/-r land in the build
    # dir where GitLab picks them up as artifacts.
    - ln -sfn "$PWD" /zap/wrk
    - zap-baseline.py -t http://localhost:8080 -c .zap/baseline.conf -J zap-baseline.json -r zap-baseline.html
  after_script:
    - echo "=== dependably app log ==="; cat app.log || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - zap-baseline.html
      - zap-baseline.json
      - app.log

# Full active attack scan — gates every MR and the release. -I is dropped and
# accepted noise lives in .zap/full.conf, so a new active finding (a real
# injection/XSS an agent introduces) reds the pipeline and blocks the merge.
# interruptible so a re-push cancels an in-flight scan instead of stacking work
# on the single amd64 runner it shares with the other gating jobs.
zap-full:
  stage: dast
  extends: [.runs-on-ci, .release-required]
  image:
    name: ${DEP_IMAGE_REGISTRY}/zaproxy/zap-stable:2.17.0@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074
    entrypoint: [""]
  needs: [build]
  tags: [amd64]
  interruptible: true
  script:
    - *app_boot
    - ln -sfn "$PWD" /zap/wrk
    - zap-full-scan.py -t http://localhost:8080 -c .zap/full.conf -J zap-full.json -r zap-full.html
  after_script:
    - echo "=== dependably app log ==="; cat app.log || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - zap-full.html
      - zap-full.json
      - app.log

# Authenticated API scan of the management surface (/api/v1/...). Imports the
# generated OpenAPI document so ZAP exercises every documented route instead of
# relying on a spider that can't crawl an API. ci/zap-dast-auth.sh logs in,
# clears the first-boot password-rotation flag, and emits a session cookie that
# ZAP's replacer add-on injects on every request. -I is dropped: accepted noise
# is enumerated in .zap/api-management.conf, so the scan goes green when clean
# and red when a new, unaccepted finding appears. Gates every MR and the release
# (.release-required): a new authenticated-API finding blocks the merge so it
# gets fixed in-context. interruptible so a re-push cancels it rather than
# queueing on the single amd64 runner. Management routes accept only the session
# JWT, not a dpd_ token.
zap-api-management:
  stage: dast
  extends: [.runs-on-ci, .release-required]
  image:
    name: ${DEP_IMAGE_REGISTRY}/zaproxy/zap-stable:2.17.0@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074
    entrypoint: [""]
  needs: [build]
  tags: [amd64]
  interruptible: true
  script:
    - *app_boot
    - sh ci/zap-dast-auth.sh
    - . ./zap-creds.env
    - ln -sfn "$PWD" /zap/wrk
    - >
      ZAP_AUTH_HEADER=Cookie ZAP_AUTH_HEADER_VALUE="$ZAP_SESSION_COOKIE"
      zap-api-scan.py -t http://localhost:8080/openapi/management.json
      -f openapi -O http://localhost:8080
      -c .zap/api-management.conf
      -J zap-api-management.json -r zap-api-management.html
  after_script:
    - echo "=== dependably app log ==="; cat app.log || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - zap-api-management.html
      - zap-api-management.json
      - app.log

# Authenticated API scan of the protocol surfaces (npm/PyPI/NuGet/…). Same
# OpenAPI import; auth is the dpd_ token as a Bearer header — TokenAuthentication
# accepts Bearer for every ecosystem, so one token covers all protocol routes
# (NuGet push via X-NuGet-ApiKey is the one documented gap). -I dropped, gates
# every MR and the release, interruptible — same rationale as zap-api-management.
zap-api-protocol:
  stage: dast
  extends: [.runs-on-ci, .release-required]
  image:
    name: ${DEP_IMAGE_REGISTRY}/zaproxy/zap-stable:2.17.0@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074
    entrypoint: [""]
  needs: [build]
  tags: [amd64]
  interruptible: true
  script:
    - *app_boot
    - sh ci/zap-dast-auth.sh
    - . ./zap-creds.env
    - ln -sfn "$PWD" /zap/wrk
    - >
      ZAP_AUTH_HEADER_VALUE="Bearer $ZAP_API_TOKEN"
      zap-api-scan.py -t http://localhost:8080/openapi/protocol.json
      -f openapi -O http://localhost:8080
      -c .zap/api-protocol.conf
      -J zap-api-protocol.json -r zap-api-protocol.html
  after_script:
    - echo "=== dependably app log ==="; cat app.log || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - zap-api-protocol.html
      - zap-api-protocol.json
      - app.log

# Single release contract. needs: is the YAML alias *release-required-jobs;
# release-contract-lint reconciles that alias against the set of jobs that
# extend .release-required and fails on drift, every push. The gate itself
# is just a pass-through that release-to-github depends on.
release-gate:
  stage: dast
  extends: .runs-on-release-tag
  image: ${DEP_IMAGE_REGISTRY}/library/alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  needs: *release-required-jobs
  script:
    - echo "release contract satisfied for $CI_COMMIT_TAG"

# === release ===

# Mirrors a release tag to GitHub: squashes everything since the previous
# vX.Y.Z tag into one commit on github/main, plus an annotated tag at the
# same SHA. Tag-triggered + serialized + ff-only + drift-detecting +
# provenance-emitting. CI owns tag identity (validate-release-tag);
# this job owns publishing only. See build/release-to-github.sh.
release-to-github:
  stage: release
  extends: .runs-on-release-tag
  needs: [release-gate]
  # See validate-release-tag for why the alpine/git entrypoint is overridden.
  image:
    name: ${DEP_IMAGE_REGISTRY}/alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
    entrypoint: [""]
  tags: [amd64]
  resource_group: github-release
  # Cancellation must not race a partial push.
  interruptible: false
  retry:
    max: 1
    when: [runner_system_failure, stuck_or_timeout_failure]
  variables:
    GIT_DEPTH: 0
  script:
    - apk add --no-cache bash
    - bash build/release-to-github.sh
  artifacts:
    paths:
      - provenance.json
    expire_in: never
    when: on_success

# === publish (runtime image) ===
#
# Build the runtime image and push it to the Dependably OCI registry on every
# GREEN main push, so dependably-integration-tests can pull it to stand up an
# ephemeral, permissive instance for the client matrix. Post-merge only
# (.runs-on-ci-main) and in the `release` stage with NO `needs:`, so it runs
# only after every earlier stage (build/test/sbom/dast) has passed — i.e. main
# is green.
#
# NOT .release-required: a side-effect publish, not a release gate, so it stays
# outside release-contract-lint. Uses buildx because the Dockerfile is
# `# syntax=docker/dockerfile:1` with `RUN --mount=type=secret` (BuildKit-only,
# matching the GitHub build) — Kaniko can't build it. This therefore needs a
# PRIVILEGED, BuildKit-capable runner (same requirement as the rpm/docker test
# suites).
#
# Prereqs (set as masked CI/CD variables):
#   REGISTRY_KEY  — token for $DEP_IMAGE_REGISTRY. Already used by the build job
#                   for proxy dep routing; must carry publish:oci to push here.
#                   If it doesn't, add a dedicated publish token var and use it
#                   for `docker login` below.
#   DOCKER_AUTH_CONFIG — base-image pull creds (already required pipeline-wide).
# TODO before enabling: pin docker:27-cli / docker:27-dind by digest like every
# other image (glsec/supply-chain lint expects it).
publish-image:
  stage: release
  extends: .runs-on-ci-main
  image: ${DEP_IMAGE_REGISTRY}/library/docker:27-cli
  services:
    - name: ${DEP_IMAGE_REGISTRY}/library/docker:27-dind   # glsec:ignore GL054 -- buildx needs BuildKit (Dockerfile uses RUN --mount=type=secret); privileged/BuildKit runner is the documented, chosen prerequisite
      alias: docker
  tags: [amd64]   # must be a privileged / BuildKit-capable runner
  # serialize publishes so concurrent main pipelines can't race the registry (GL019)
  resource_group: publish-image
  variables:
    # Talk to the dind service over its plaintext endpoint. TLS (2376) needs the
    # runner to share dind's generated /certs/client volume into the job container;
    # the self-hosted runners do not, so a TLS client finds no ca.pem and fails to
    # initialize. The dind<->client traffic stays on the job's isolated service
    # bridge network, which is never reachable outside the job.
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: "" # glsec:ignore GL031 -- TLS on 2376 needs the runner to share dind's /certs/client volume into the job, which these self-hosted runners do not; the docker executor isolates the dind daemon on this job's per-build service network, so 2375 is not reachable by other jobs
    IMAGE_REPO: ${DEP_IMAGE_REGISTRY}/dependably/community
  # Auth + build-time dep routing reuse the existing REGISTRY_URL / REGISTRY_KEY
  # CI vars (same as the build job); REGISTRY_KEY must carry publish:oci to push.
  script:
    - echo "$REGISTRY_KEY" | docker login "$DEP_IMAGE_REGISTRY" -u api --password-stdin
    # The dind service daemon comes up a few seconds after the job container, so the
    # first command that talks to it races startup ("Cannot connect to the Docker
    # daemon at tcp://docker:2375"). docker login above is a local config write and
    # does not touch the daemon, so wait for the daemon to accept connections here.
    - |
      for i in $(seq 30); do docker info >/dev/null 2>&1 && break; echo "waiting for dind ($i)..."; sleep 1; done
      docker info >/dev/null 2>&1 || { echo "dind daemon did not become ready on $DOCKER_HOST"; exit 1; }
    - docker buildx create --use --name dep-builder
    - printf '%s' "$REGISTRY_KEY" > /tmp/registry_key
    # Stamp a valid SemVer prerelease (a raw SHA is not a valid .NET version
    # string); FILE_VERSION is the single source of truth in Directory.Build.props.
    - |
      FILE_VERSION=$(grep -oE '<Version>[^<]+</Version>' Directory.Build.props \
        | sed -E 's|<Version>(.*)</Version>|\1|')
      BUILD_VERSION="${FILE_VERSION}-main.${CI_COMMIT_SHORT_SHA}"
      echo "Stamping image version $BUILD_VERSION"
    - >-
      docker buildx build
      --build-arg VERSION="$BUILD_VERSION"
      --build-arg REGISTRY_URL="$REGISTRY_URL"
      --secret id=registry_key,src=/tmp/registry_key
      --tag "$IMAGE_REPO:main"
      --tag "$IMAGE_REPO:$BUILD_VERSION"
      --push .
    - rm -f /tmp/registry_key
