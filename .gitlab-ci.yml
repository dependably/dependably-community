# Schema/migration guard. Two test categories, both gating:
#   Category=Schema         — applies the full schema to a fresh SQLite DB and asserts structural
#                             soundness + idempotent replay (SchemaIntegrityTests), and statically
#                             checks additive-migration sync, NOT NULL-without-DEFAULT, and
#                             SQLite↔Postgres source parity (Schema*ComplianceTests). No external deps.
#   Category=SchemaPostgres — applies Schema.pg.sql + migrations against the live postgres service
#                             below via NpgsqlMetadataStore (PostgresSchemaApplyTests), proving the
#                             Postgres path boots, is idempotent, and matches the SQLite shape.
# Both excluded from unit-tests so this job is the single schema signal. TEST_POSTGRES_CONNECTION
# points at the service (alias `postgres`); the database is disposable (each test resets `public`).
schema-integrity:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: ${DEP_IMAGE_REGISTRY}/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
