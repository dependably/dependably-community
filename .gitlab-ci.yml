# Pipeline-level filter. Without this GitLab runs both a branch pipeline AND
# an MR pipeline when an MR is open on a branch — double cost. Order matters:
# the explicit `when: never` for "push when an MR is open" must come before
# the main-branch and tag rules so it isn't shadowed.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

stages:
  - validate
  - build
  - test
  - sbom
  - ai-review      # advisory LLM review of the MR diff (local Ollama)
  - dast
  - release

# All job images are pinned by digest; bump tag+digest together.
# No container image is built in CI (deploy builds locally via docker compose), so no image-scanning job exists by design.

# Release-tag predicate. Single source of truth — referenced from
# .runs-on-ci{,-main} so branch and tag execution share entry conditions,
# and from validate-release-tag / release-gate / release-to-github so the
# regex lives in exactly one place.
.release-tag-rule: &release-tag-rule
  if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# MR-gated jobs (build/test/scan/sbom). Also fire on main pushes (post-merge
# re-run) and on release-tag pipelines so the release gate has something to
# enforce. Branch pushes without an MR are filtered out by the workflow rule.
.runs-on-ci:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - *release-tag-rule

# Post-merge-only jobs: side effects on real systems (DT publish) and scans
# scoped to main to avoid per-MR noise (sonarqube-check). Release-tag inclusion
# stays — removing it silently weakens the release gate by skipping required
# jobs on tag pipelines.
.runs-on-ci-main:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
    - *release-tag-rule

# Release-tag-only jobs (validate-release-tag, release-gate). Lets required
# jobs that only ever run on release tags inherit their rule from an anchor
# rather than declaring inline — keeps them inside release-contract-lint's
# RULE_PROVIDERS set.
.runs-on-release-tag:
  rules:
    - *release-tag-rule

# Marker template. Sets a single inherited env var so the marker is visible
# at runtime (and so GitLab accepts the hidden job — empty `{}` is rejected
# as "config can't be blank"). Every job whose pass is required for a
# release to ship extends this AND one of .runs-on-ci{,-main}; drift caught
# by release-contract-lint.
.release-required:
  variables:
    RELEASE_REQUIRED: "true"

# Single list of required jobs, in canonical needs-object form so the alias
# expands into exactly the shape GitLab expects. `artifacts: false` because
# release-gate only cares about pass/fail. Edit here when adding/removing a
# required job; release-contract-lint enforces equality with the set of jobs
# that extend .release-required.
.release-required-jobs: &release-required-jobs
  - { job: validate-release-tag,   artifacts: false }
  - { job: lockfile-registry-guard, artifacts: false }
  - { job: build,                  artifacts: false }
  - { job: lint,                   artifacts: false }
  - { job: dotnet-format,          artifacts: false }
  - { job: csp-inline-style-guard, artifacts: false }
  - { job: chrome-emoji-guard,     artifacts: false }
  - { job: secret-scan,            artifacts: false }
  - { job: secret-scan-deep,       artifacts: false }
  - { job: unit-tests,             artifacts: false }
  - { job: api-contract,           artifacts: false }
  - { job: integration-tests,      artifacts: false }
  - { job: schema-integrity,       artifacts: false }
  - { job: frontend-tests,         artifacts: false }
  - { job: e2e,                    artifacts: false }
  - { job: sbom-backend,           artifacts: false }
  - { job: sbom-frontend,          artifacts: false }
  - { job: dt-publish,             artifacts: false }
  - { job: zap-baseline,           artifacts: false }
  - { job: zap-full,               artifacts: false }
  - { job: zap-api-management,     artifacts: false }
  - { job: zap-api-protocol,       artifacts: false }
  - { job: sca-backend,            artifacts: false }
  - { job: sca-frontend,           artifacts: false }

# Wires `REGISTRY_URL` + `REGISTRY_KEY` (set as unprotected project CI variables) into npm +
# NuGet so restores route through the private Dependably instance. HARD-FAILS when either var
# is empty rather than silently falling back to public — the GitLab pipeline must always use
# the private feed. (GitHub Actions intentionally stays on public; see .github/workflows.)
.private-registry-setup:
  before_script:
    - |
      # No `set -eu` here: GitLab concatenates before_script + script into one shell, so a
      # stray `set -u` would leak into the job script and trip on optional unset vars. Use
      # explicit checks + `exit 1` (which aborts the job) instead.
      if [ -z "${REGISTRY_URL:-}" ] || [ -z "${REGISTRY_KEY:-}" ]; then
        echo "ERROR: REGISTRY_URL/REGISTRY_KEY are empty — refusing to restore from public registries." >&2
        echo "Both are unprotected project CI/CD variables; an empty value means they were removed or scoped out (e.g. a fork pipeline)." >&2
        exit 1
      fi
      HOST=$(printf '%s' "$REGISTRY_URL" | sed -E 's|^https?://||; s|/.*||')
      printf 'registry=%s/npm/\n//%s/npm/:_authToken=%s\nfund=false\n' \
        "$REGISTRY_URL" "$HOST" "$REGISTRY_KEY" > "$HOME/.npmrc"
      # Write LOWERCASE nuget.config so it OVERWRITES the committed public one. On a
      # case-sensitive Linux runner NuGet checks "nuget.config" before "NuGet.Config" and
      # returns on the first match, so a capital-N file is shadowed by the committed lowercase
      # one. Same path => exactly one config => the private feed wins deterministically.
      {
        echo '<?xml version="1.0" encoding="utf-8"?>'
        echo '<configuration>'
        echo '  <packageSources>'
        echo '    <clear />'
        echo "    <add key=\"dependably\" value=\"${REGISTRY_URL}/nuget/v3/index.json\" />"
        echo '  </packageSources>'
        echo '  <packageSourceCredentials>'
        echo '    <dependably>'
        echo '      <add key="Username" value="ci" />'
        echo "      <add key=\"ClearTextPassword\" value=\"${REGISTRY_KEY}\" />"
        echo '    </dependably>'
        echo '  </packageSourceCredentials>'
        echo '</configuration>'
      } > "$CI_PROJECT_DIR/nuget.config"
      # Self-check: the active config must reference the private host and never a public one.
      # Catches a future regression (e.g. a re-added public fallback) loudly instead of
      # silently shipping public traffic.
      if grep -qiE 'api\.nuget\.org|registry\.npmjs\.org' "$CI_PROJECT_DIR/nuget.config" "$HOME/.npmrc"; then
        echo "ERROR: generated registry config still references a public host:" >&2
        grep -niE 'api\.nuget\.org|registry\.npmjs\.org' "$CI_PROJECT_DIR/nuget.config" "$HOME/.npmrc" >&2
        exit 1
      fi
      if ! grep -qF "$HOST" "$CI_PROJECT_DIR/nuget.config"; then
        echo "ERROR: nuget.config does not reference the private host '$HOST' after write." >&2
        exit 1
      fi

# === validate ===

# Single authority for tag identity. Owns: annotated-tag check, tag→commit
# binding, ancestor-of-main check, Directory.Build.props version match.
# Downstream scripts must not re-validate these.
validate-release-tag:
  stage: validate
  extends: [.runs-on-release-tag, .release-required]
  # alpine/git's entrypoint is `git`; override so the runner's shell wrapper
  # can execute the step script (otherwise it runs as `git sh ...`).
  image:
    name: alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: fetch
  script:
    - |
      set -eu
      TAG="$CI_COMMIT_TAG"
      VERSION="${TAG#v}"
      git fetch origin --tags --force
      git fetch origin main
      [ "$(git cat-file -t "$TAG")" = "tag" ] \
        || { echo "ERROR: tag $TAG must be annotated, not lightweight" >&2; exit 1; }
      TAG_COMMIT=$(git rev-parse "${TAG}^{commit}")
      [ "$TAG_COMMIT" = "$CI_COMMIT_SHA" ] \
        || { echo "ERROR: tag $TAG points at $TAG_COMMIT, pipeline ran on $CI_COMMIT_SHA" >&2; exit 1; }
      git merge-base --is-ancestor "$TAG_COMMIT" origin/main \
        || { echo "ERROR: tag commit $TAG_COMMIT not reachable from origin/main" >&2; exit 1; }
      FILE_VERSION=$(grep -oE '<Version>[^<]+</Version>' Directory.Build.props \
        | sed -E 's|<Version>(.*)</Version>|\1|')
      [ "$FILE_VERSION" = "$VERSION" ] \
        || { echo "ERROR: tag $TAG implies version $VERSION but Directory.Build.props has $FILE_VERSION" >&2; exit 1; }
      echo "Tag identity verified: $TAG → $TAG_COMMIT (version $VERSION, ancestor of main)"

# Reconciles the release contract on every push: the set of jobs extending
# .release-required must equal release-gate.needs, and every required job
# must inherit its release-tag rule from .runs-on-ci{,-main} (no inline
# `rules:`, no other rule-providing template). Drift fails at MR/branch
# time, not at release time.
release-contract-lint:
  stage: validate
  extends: .runs-on-ci
  # alpine:3 (not python:3-alpine) so apk's py3-yaml lands in the same
  # python path that `python3` resolves to. The official python image keeps
  # its interpreter under /usr/local and ignores Alpine's site-packages.
  image: alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  script:
    - apk add --no-cache python3 py3-yaml
    - |
      python3 <<'PY'
      import sys, yaml
      with open('.gitlab-ci.yml') as f:
          doc = yaml.safe_load(f)
      # Concrete jobs: dict-valued, non-dot-prefixed (excludes templates/anchors),
      # carrying any of GitLab's three runnable primitives. `default:`,
      # `workflow:`, `variables:`, etc. carry none of these. If a future job
      # inherits its runnable purely via `extends:` (none today), broaden the
      # discriminator — the lint failure is loud.
      RUNNABLE = {'script', 'trigger', 'run'}
      jobs = {k: v for k, v in doc.items()
              if isinstance(v, dict) and not k.startswith('.')
              and RUNNABLE & v.keys()}
      def extends_of(job):
          e = job.get('extends')
          return [e] if isinstance(e, str) else (e or [])
      required = sorted(name for name, job in jobs.items()
                        if '.release-required' in extends_of(job))
      gate_needs = sorted(
          n['job'] if isinstance(n, dict) else n
          for n in doc.get('release-gate', {}).get('needs', [])
      )
      errs = []
      if required != gate_needs:
          missing = set(required) - set(gate_needs)
          extra   = set(gate_needs) - set(required)
          if missing: errs.append(f"missing from .release-required-jobs anchor: {sorted(missing)}")
          if extra:   errs.append(f"extra in gate but no marker:                {sorted(extra)}")
      # Bypass guard: a required job must inherit its release-tag rule from
      # .runs-on-ci{,-main}. Any other `rules:` source — inline on the job,
      # or via another extended template — wins under GitLab's extends
      # merging and would silently skip the job on tag pipelines.
      RULE_PROVIDERS = {'.runs-on-ci', '.runs-on-ci-main', '.runs-on-release-tag'}
      for name in required:
          job = jobs[name]
          ext = extends_of(job)
          if 'rules' in job:
              errs.append(f"{name}: required jobs must not define inline `rules:`; "
                          f"inherit from .runs-on-ci{{,-main}} instead")
          if not (set(ext) & RULE_PROVIDERS):
              errs.append(f"{name}: required jobs must also extend .runs-on-ci or "
                          f".runs-on-ci-main so release-tag-rule applies")
          for t in ext:
              if t in RULE_PROVIDERS or t == '.release-required':
                  continue
              tmpl = doc.get(t)
              if isinstance(tmpl, dict) and 'rules' in tmpl:
                  errs.append(f"{name}: extends `{t}` which defines `rules:` — that "
                              f"would override .runs-on-ci{{,-main}} under GitLab's "
                              f"extends merging. Remove rules from that template or "
                              f"refactor into a new anchor that re-includes "
                              f"*release-tag-rule.")
      if errs:
          for e in errs:
              print("release-contract-lint:", e, file=sys.stderr)
          sys.exit(1)
      print(f"release-contract-lint: {len(required)} required jobs, gate aligned.")
      PY

# Fails MRs that leak the private dependably registry into web/package-lock.json.
# Happens when a dev's ~/.npmrc points npm at the private proxy and `npm install`
# writes those URLs as `resolved`. Catches pre-mirror — GitHub runners have no
# auth for the private host and would fail `npm ci` after the merge.
lockfile-registry-guard:
  stage: validate
  extends: [.runs-on-ci, .release-required]
  image: alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  script:
    - apk add --no-cache grep
    - |
      bad=$(grep -nE '"resolved":[[:space:]]*"https?://[^"]+"' web/package-lock.json \
            | grep -v 'registry.npmjs.org/' || true)
      if [ -n "$bad" ]; then
        echo "Non-public npm registry in web/package-lock.json:" >&2
        echo "$bad" >&2
        echo "Re-resolve those packages against https://registry.npmjs.org/ before committing." >&2
        exit 1
      fi

# Fails the pipeline early when the private registry isn't actually in effect, so a
# misconfigured pipeline can't silently restore from public registries. Not release-gating
# (absent from release-gate.needs): .private-registry-setup already hard-fails every restore
# job without the vars, so a green release implies the private feed was used — this is the
# fast, explicit signal. Inline rules mirror .runs-on-ci but exclude fork MRs, which
# legitimately lack the unprotected project vars (so they aren't failed for it).
private-registry-guard:
  stage: validate
  image: alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - *release-tag-rule
  script:
    - apk add --no-cache curl
    - |
      if [ -z "${REGISTRY_URL:-}" ] || [ -z "${REGISTRY_KEY:-}" ]; then
        echo "ERROR: REGISTRY_URL/REGISTRY_KEY are empty on an internal pipeline." >&2
        echo "Restores would fall back to public registries. Set both project CI/CD variables." >&2
        exit 1
      fi
      base="${REGISTRY_URL%/}"
      # NuGet v3 service index — authenticated GET should return 200 on a healthy private feed.
      code=$(curl -sSL -o /dev/null -w '%{http_code}' -u "ci:$REGISTRY_KEY" "$base/nuget/v3/index.json" || echo 000)
      if [ "$code" != "200" ]; then
        echo "ERROR: NuGet service index $base/nuget/v3/index.json returned HTTP $code (expected 200)." >&2
        exit 1
      fi
      # npm endpoint — prove reachability + that the token isn't rejected. A healthy proxy may
      # answer the bare root with 200/3xx/404; only an unreachable host or a 401/403 is fatal.
      code=$(curl -sSL -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $REGISTRY_KEY" "$base/npm/" || echo 000)
      case "$code" in
        000)     echo "ERROR: npm endpoint $base/npm/ unreachable (curl failed)." >&2; exit 1 ;;
        401|403) echo "ERROR: npm endpoint $base/npm/ rejected the CI token (HTTP $code)." >&2; exit 1 ;;
        *)       echo "npm endpoint reachable (HTTP $code), token accepted." ;;
      esac
      echo "private-registry-guard: $base reachable; NuGet index 200, npm token accepted."

# === build ===

build-web:
  stage: build
  # Not in .release-required: gated transitively via `build`'s `needs:`.
  extends: [.private-registry-setup, .runs-on-ci]
  image: node:22-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
  script:
    - cd web && npm ci && npm run build
  artifacts:
    paths:
      - src/Dependably/wwwroot/
    expire_in: 1 hour

build:
  stage: build
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  needs: [build-web]
  # Heavy job + produces the linux-x64 artifact consumed by e2e/zap. Pin to amd64
  # runners so the publish happens natively (faster, and avoids qemu surprises).
  tags: [amd64]
  script:
    # PublishSingleFile=true (set in csproj) requires a RID and emits to bin/Release/net10.0/<rid>/publish/.
    # Pin linux-x64 so the artifact path and the e2e job's invocation are deterministic. Self-contained
    # is required because csproj enables EnableCompressionInSingleFile, which the SDK rejects otherwise.
    - dotnet publish src/Dependably -c Release -r linux-x64 --self-contained true
  artifacts:
    paths:
      - src/Dependably/bin/Release/net10.0/linux-x64/publish/
    expire_in: 1 hour

# === test ===

lint:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: node:22-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
  script:
    - cd web && npm ci && npm run lint && npm run lint:css && npm run check

# C# style/whitespace gate. `dotnet format --verify-no-changes` fails (non-zero) when any
# file deviates from the .editorconfig rules, so an unformatted commit blocks the MR instead
# of drifting in. Both subcommands are run explicitly (matching the local pre-commit hook):
# whitespace is syntactic; style runs the IDExxxx code-style analyzers against the .editorconfig.
dotnet-format:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  tags: [amd64]
  script:
    - dotnet format whitespace --verify-no-changes
    - dotnet format style --verify-no-changes

csp-inline-style-guard:
  stage: test
  extends: [.runs-on-ci, .release-required]
  image: alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  script:
    - apk add --no-cache grep
    - |
      if grep -rn 'style="' web/src --include='*.svelte'; then
        echo "Inline style=\"…\" attributes are forbidden — they violate the SPA's CSP style-src directive. Use CSS classes instead." >&2
        exit 1
      fi

chrome-emoji-guard:
  stage: test
  extends: [.runs-on-ci, .release-required]
  image: alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  script:
    - apk add --no-cache grep
    - |
      if grep -rPn '[\x{1F300}-\x{1FAFF}\x{2600}-\x{27BF}\x{2700}-\x{27BF}\x{2300}-\x{23FF}]' web/src --include='*.svelte'; then
        echo "Emoji codepoint detected in web/src. Use a sprite from web/public/icons.svg instead — DESIGN.md §11." >&2
        exit 1
      fi

secret-scan:
  stage: test
  extends: [.runs-on-ci, .release-required]
  image:
    name: trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
  script:
    - trufflehog git file://. --since-commit "${CI_COMMIT_BEFORE_SHA:-HEAD~1}" --only-verified --fail

# Full-history, all-detectors sweep (no --since-commit, no --only-verified) —
# the thorough counterpart to secret-scan's fast incremental verified-only gate.
# Runs on every MR (it is fast here) and gates the release. A false positive in
# history is silenced via .trufflehog-exclude; a real finding fails the pipeline.
secret-scan-deep:
  stage: test
  extends: [.runs-on-ci, .release-required]
  image:
    name: trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
  script:
    - trufflehog git file://. --exclude-paths=.trufflehog-exclude --fail

unit-tests:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  tags: [amd64]
  script:
    # No --collect:"XPlat Code Coverage" here on purpose. The coverage it would produce is
    # unused: sonarqube-check re-runs the suite with its own collector. Keeping this job to
    # plain test + junit so it finishes fast.
    # JunitXml.TestLogger resolves a relative LogFilePath against the test project
    # directory, which would land the file at tests/Dependably.Tests/test-results/…
    # — outside the artifact path below, so GitLab's Tests tab stays empty. Pin to
    # $CI_PROJECT_DIR so the file lands where artifacts:reports:junit looks.
    - dotnet test --filter "Category!=Integration&Category!=ApiContract&Category!=Schema&Category!=SchemaPostgres" --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results/unit.xml"
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit: test-results/unit.xml

api-contract:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  tags: [amd64]
  script:
    - dotnet test --filter "Category=ApiContract" --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results/contract.xml"
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit: test-results/contract.xml

integration-tests:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  tags: [amd64]
  script:
    - dotnet test --filter "Category=Integration" --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results/integration.xml"
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit: test-results/integration.xml

# Schema/migration guard. Two test categories, both gating:
#   Category=Schema         — applies the full schema to a fresh SQLite DB and asserts structural
#                             soundness + idempotent replay (SchemaIntegrityTests), and statically
#                             checks additive-migration sync, NOT NULL-without-DEFAULT, and
#                             SQLite↔Postgres source parity (Schema*ComplianceTests). No external deps.
#   Category=SchemaPostgres — applies Schema.pg.sql + migrations against the live postgres service
#                             below via NpgsqlMetadataStore (PostgresSchemaApplyTests), proving the
#                             Postgres path boots, is idempotent, and matches the SQLite shape.
# Both excluded from unit-tests so this job is the single schema signal. TEST_POSTGRES_CONNECTION
# points at the service (alias `postgres`); the database is disposable (each test resets `public`).
schema-integrity:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  tags: [amd64]
  services:
    - name: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
      alias: postgres
  variables:
    POSTGRES_DB: dependably_test
    POSTGRES_USER: dependably
    POSTGRES_PASSWORD: dependably_test_pw
    TEST_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=dependably_test;Username=dependably;Password=dependably_test_pw"
  script:
    - dotnet test --filter "Category=Schema|Category=SchemaPostgres" --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results/schema.xml"
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit: test-results/schema.xml

frontend-tests:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: node:22-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
  script:
    - cd web
    - npm ci
    - npm run test:coverage
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - web/coverage/
    reports:
      junit: web/test-results/junit.xml

# SCA vulnerability gate for NuGet dependencies. Vulnerability data comes from
# <auditSources> in nuget.config — the --source flag applies only to package
# downloads, not advisory lookups. A minimal nuget.config with api.nuget.org as
# both the package source and the audit source is written here so that restore
# and advisory queries both reach the public feed. The private registry is not
# used: SCA requires advisory data from nuget.org, which Dependably does not serve.
sca-backend:
  stage: test
  extends: [.runs-on-ci, .release-required]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  tags: [amd64]
  script:
    - |
      # Write a nuget.config with api.nuget.org as both the package source and the
      # auditSource so `dotnet list package --vulnerable` can reach advisory data.
      # The private feed is intentionally absent: advisory data lives only on
      # nuget.org and the restore here is solely to satisfy the list command's
      # precondition (not to produce build artifacts consumed by other jobs).
      cat > nuget.config <<'NUGETCFG'
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <packageSources>
          <clear />
          <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
        </packageSources>
        <auditSources>
          <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
        </auditSources>
      </configuration>
      NUGETCFG
    - apt-get update -qq && apt-get install -y -qq jq > /dev/null
    - dotnet restore
    - dotnet list package --vulnerable --include-transitive --format json > sca-backend.json
    - |
      cat sca-backend.json
      BAD=$(jq '[.projects[].frameworks[]? | (.topLevelPackages[]?, .transitivePackages[]?) | select(.vulnerabilities != null) | .vulnerabilities[] | select(.severity == "High" or .severity == "Critical")] | length' sca-backend.json)
      if [ "$BAD" -gt 0 ]; then
        echo "ERROR: $BAD High/Critical vulnerable NuGet package reference(s) — see sca-backend.json above." >&2
        exit 1
      fi
  artifacts:
    when: always
    expire_in: 30 days
    paths: [sca-backend.json]

# SCA vulnerability gate for npm dependencies. Uses the public npm audit advisory endpoint
# (--registry flag) for vulnerability data — the private proxy does not implement
# the /-/npm/v1/security/advisories/bulk endpoint that npm audit requires.
sca-frontend:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: node:22-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
  script:
    - cd web
    - npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org

# Dockerfile style/hygiene gate. Not release-required — lint issues are advisory
# until the operator chooses to enforce them. DL3018 (pin apk versions) is
# intentionally ignored: the runtime base is already digest-pinned, so the
# package version granularity adds no supply-chain value at build time.
docker-lint:
  stage: test
  extends: .runs-on-ci
  image:
    name: hadolint/hadolint:latest-alpine@sha256:7aba693c1442eb31c0b015c129697cb3b6cb7da589d85c7562f9deb435a6657c
    entrypoint: [""]
  script:
    - hadolint Dockerfile

e2e:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: mcr.microsoft.com/playwright:v1.59.1-noble@sha256:b0ab6f3cb99aa7803adbc14d9027ec1785fc6e433b97e134e0f8fe61683b6b53
  needs: [build]
  # Playwright image is amd64-only; on Pi runners it ran under qemu and the slow
  # emulation caused intermittent timing flakes. Pin to native amd64.
  tags: [amd64]
  script:
    - cd web
    - npm ci
    - npx playwright install chromium
    - npm run e2e -- --project=chromium
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - web/playwright-report/
      - web/test-results/
    reports:
      junit: web/test-results/junit.xml

# Signal-only — not in release-gate.needs. allow_failure: true is intentional;
# scan results inform Sonar dashboards but don't gate the release.
#
# Main + tag only. SonarQube Community Edition rejects sonar.pullrequest.*
# ("Developer Edition or above is required"), so running on merge_request_event
# either fails (with the PR-decoration args) or pollutes the main branch's
# analysis (without them, the feature-branch source gets stored against the
# project's default branch). Until the server is upgraded, MR coverage is out
# of reach; rather than ship noise, scope sonar to post-merge.
sonarqube-check:
  stage: test
  extends: [.private-registry-setup, .runs-on-ci-main]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  needs: [frontend-tests]
  tags: [amd64]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - apt-get update
    - apt-get install --yes --no-install-recommends openjdk-17-jre-headless nodejs
    - dotnet tool install --global dotnet-sonarscanner
    - export PATH="$PATH:$HOME/.dotnet/tools"
    # The token is passed explicitly via /d:sonar.token — the SONAR_TOKEN environment
    # variable alone is NOT honored by the scanner's begin step against this SonarQube
    # 9.9 server (pre-processing fails with "Authentication with the server has failed").
    # This is safe for the job trace: GitLab echoes script lines unexpanded (the literal
    # text $SONAR_TOKEN), so the value never appears in the log regardless of variable
    # masking. SONAR_TOKEN must still be a masked CI/CD variable (see CONTRIBUTING >
    # SonarQube (CI)).
    # SonarQube 9.9 LTS's C# plugin v8.51 does NOT trigger the "C# Tests Coverage Report
    # Import" sensor on `sonar.cs.cobertura.reportsPaths` in this stack — last scan log
    # showed the cobertura file present + path-correct + the property set, yet the sensor
    # never ran and "Zero Coverage Sensor" stamped every file at 0/N. OpenCover is the
    # historically-preferred C# format for SonarQube and the sensor for it (sonar.cs.
    # opencover.reportsPaths) is rock-solid. ReportGenerator converts cobertura → OpenCover.
    - >
      dotnet sonarscanner begin
      /k:"$SONAR_PROJECT_KEY"
      /d:sonar.token="$SONAR_TOKEN"
      /d:sonar.host.url="$SONAR_HOST_URL"
      /d:sonar.cs.opencover.reportsPaths="test-results/opencover.xml"
      /d:sonar.cs.vstest.reportsPaths="test-results/tests.trx"
      /d:sonar.javascript.lcov.reportPaths="web/coverage/lcov.info"
      /d:sonar.coverage.exclusions="src/Dependably/Program.cs,src/Dependably/Infrastructure/Schema*.sql,src/Dependably/Infrastructure/Redis/**/*.cs,src/Dependably/Infrastructure/RedisLockoutStore.cs,src/Dependably/Infrastructure/NpgsqlMetadataStore.cs,src/Dependably/Storage/AzureBlobContainerAdapter.cs,src/Dependably/Infrastructure/SpdxLicenseRepository.cs,web/src/main.js,web/src/App.svelte,web/src/locales/**,web/.stylelintrc.cjs,web/svelte.config.js,web/vite.config.js,web/vitest.config.js,web/eslint.config.js,build/extract-notices.mjs,i18n/scripts/i18n-validate.js"
      /d:sonar.exclusions="web/e2e/**"
      /d:sonar.test.inclusions="**/*Tests.cs,**/*.test.js,**/*.spec.js,**/*.spec.ts"
      /d:sonar.issue.ignore.multicriteria="e1"
      /d:sonar.issue.ignore.multicriteria.e1.ruleKey="csharpsquid:S5332"
      /d:sonar.issue.ignore.multicriteria.e1.resourceKey="**/RpmRepodataService.cs"
    - dotnet build
    - dotnet test --filter "Category!=Integration&Category!=ApiContract&Category!=SchemaPostgres" --settings coverlet.runsettings --collect:"XPlat Code Coverage" --logger "trx;LogFileName=tests.trx" --results-directory ./test-results
    # coverlet.collector now emits opencover (per coverlet.runsettings <Format>opencover</Format>)
    # at test-results/<guid>/coverage.opencover.xml. Move to a deterministic path so the
    # scanner config can point at a literal filename.
    - find test-results -name 'coverage.opencover.xml' -exec mv -f {} test-results/opencover.xml \;
    - echo "=== artifacts SonarScanner is about to ingest ==="
    - ls -la test-results/opencover.xml test-results/tests.trx web/coverage/lcov.info
    - echo "--- opencover header ---"
    - head -10 test-results/opencover.xml
    - dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
  allow_failure: true

snyk-code:
  # Snyk Code (SAST) gate: fails only on findings absent from ci/snyk-code-baseline.json
  # (see CONTRIBUTING > Static analysis (Snyk Code)). Gating (allow_failure: false): a finding
  # not on the baseline fails the pipeline and blocks the merge. A genuine new FP gets an inline
  # // deepcode ignore at the site + ci/snyk-code-scan.sh --update committed in the same MR.
  # SNYK_TOKEN must be an UNPROTECTED, masked CI/CD variable — merge-request pipelines run on
  # unprotected branches, so a protected token would be absent there and every MR scan errors.
  stage: test
  extends: [.runs-on-ci]
  image:
    name: snyk/snyk:linux@sha256:aeb296d943659dccbc7464340bb8741f6e11999cd99644dc92e6d315d6eda3f4
    entrypoint: [""]
  before_script:
    - command -v jq >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends jq; }
  script:
    - ci/snyk-code-scan.sh
  allow_failure: false

# === sbom ===

sbom-backend:
  stage: sbom
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
  script:
    - dotnet tool restore
    - dotnet CycloneDX src/Dependably/Dependably.csproj -o . -fn sbom-backend.json -F json -spv 1.6 --exclude-dev
  artifacts:
    paths:
      - sbom-backend.json
    expire_in: 30 days

sbom-frontend:
  stage: sbom
  extends: [.private-registry-setup, .runs-on-ci, .release-required]
  image: node:22-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
  script:
    - cd web && npm ci && npm run sbom
  artifacts:
    paths:
      - web/sbom-frontend.json
    expire_in: 30 days

dt-publish:
  stage: sbom
  extends: [.runs-on-ci-main, .release-required]
  image: alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  needs:
    - job: sbom-backend
      artifacts: true
    - job: sbom-frontend
      artifacts: true
  variables:
    DT_PARENT_NAME: "Dependably Community"
    DT_VERSION: "latest"
  script:
    - apk add --no-cache curl
    - |
      set -eu
      AUTH="X-Api-Key: $dependencyTrack_token"
      BASE="${dependencyTrack_url%/}"

      status=$(curl -sS -o /tmp/parent.out -w '%{http_code}' \
        -X PUT "$BASE/api/v1/project" \
        -H "$AUTH" -H 'Content-Type: application/json' \
        -d "{\"name\":\"$DT_PARENT_NAME\",\"version\":\"$DT_VERSION\"}")
      case "$status" in
        201|409) echo "Parent ready (HTTP $status)";;
        *) echo "Parent bootstrap failed (HTTP $status):" >&2; cat /tmp/parent.out >&2; exit 1;;
      esac

      upload() {
        child="$1"; file="$2"
        echo "Publishing $child from $file"
        status=$(curl -sS -o /tmp/bom.out -w '%{http_code}' \
          -X POST "$BASE/api/v1/bom" \
          -H "$AUTH" \
          -F "autoCreate=true" \
          -F "projectName=$child" \
          -F "projectVersion=$DT_VERSION" \
          -F "parentName=$DT_PARENT_NAME" \
          -F "parentVersion=$DT_VERSION" \
          -F "bom=@$file")
        case "$status" in
          200) echo "  uploaded";;
          *) echo "  upload failed (HTTP $status):" >&2; cat /tmp/bom.out >&2; exit 1;;
        esac
      }
      upload backend  sbom-backend.json
      upload frontend web/sbom-frontend.json

# === ai-review ===

# Advisory LLM review of the MR diff against a local Ollama instance. Signal-only
# (allow_failure: true), MR-only, and deliberately NOT .release-required —
# non-deterministic model output must never gate a release (mirrors zap-full /
# sonarqube-check). Each concrete job supplies a persona prompt file + a report
# name; all diff/curl/jq/report/comment logic lives in ci/ai-review.sh so the
# jobs don't duplicate it. resource_group serializes the four jobs so a single
# local model isn't hit by four concurrent 30B requests.
.ai-review:
  stage: ai-review
  image: alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  # MR-only: the diff and the MR to comment on only exist on a merge_request
  # pipeline. Inline rules are safe here because these jobs do NOT extend
  # .release-required, so release-contract-lint's "no inline rules" guard
  # (which only inspects required jobs) does not apply.
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # No `needs:` — run in stage order (after sbom), so the model only reviews an
  # MR whose build/test/sbom already passed instead of racing ahead at t=0.
  resource_group: ai-review
  interruptible: true
  timeout: 20 minutes
  variables:
    # Defaults; override via project CI/CD variables without editing YAML.
    OLLAMA_URL: "http://192.168.2.25:11434"
    OLLAMA_MODEL: "gemma4:12b-it-qat"
    GIT_DEPTH: "20"
    AI_REVIEW_MAX_DIFF_BYTES: "120000"
    # Must hold the ~35K-token prompt a 120000-byte diff produces plus generation
    # room; at 16384 the prompt filled the window and the model returned no content.
    AI_REVIEW_NUM_CTX: "49152"
    # gemma4:* is a reasoning model; thinking burns the generation budget before any
    # answer is written. Off => the model writes the review straight to content.
    AI_REVIEW_THINK: "false"
  allow_failure: true
  before_script:
    - apk add --no-cache bash curl jq git
  script:
    - bash ci/ai-review.sh "$AI_REVIEW_PERSONA_FILE" "$AI_REVIEW_REPORT_FILE"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - "$AI_REVIEW_REPORT_FILE"

ai-review-security:
  extends: .ai-review
  variables:
    AI_REVIEW_PERSONA_FILE: "ci/prompts/security.md"
    AI_REVIEW_REPORT_FILE: "ai-security-review.md"
    AI_REVIEW_LABEL: "Security"

ai-review-code:
  extends: .ai-review
  variables:
    AI_REVIEW_PERSONA_FILE: "ci/prompts/code.md"
    AI_REVIEW_REPORT_FILE: "ai-code-review.md"
    AI_REVIEW_LABEL: "Code Quality"

ai-review-architecture:
  extends: .ai-review
  variables:
    AI_REVIEW_PERSONA_FILE: "ci/prompts/architecture.md"
    AI_REVIEW_REPORT_FILE: "ai-architecture-review.md"
    AI_REVIEW_LABEL: "Architecture"

ai-review-docs:
  extends: .ai-review
  variables:
    AI_REVIEW_PERSONA_FILE: "ci/prompts/documentation.md"
    AI_REVIEW_REPORT_FILE: "ai-docs-review.md"
    AI_REVIEW_LABEL: "Documentation"

# === dast ===

# Shared app-boot for every DAST job: copies the published binary, boots it on
# :8080 with a throwaway DB/blob store, and waits on /ready (aborting if the
# process dies). Mirrors the Playwright CI webServer pattern in
# web/e2e/playwright.config.ts: same binary path, same env-var shape, same gate.
.zap_app_boot: &zap_app_boot |
  mkdir -p /tmp/dast/blobs
  export DB_PATH=/tmp/dast/dependably.db
  export LOCAL_STORAGE_PATH=/tmp/dast/blobs
  export STORAGE_BACKEND=local
  export ASPNETCORE_URLS=http://+:8080
  export FIRST_BOOT_ADMIN_PASSWORD="$DAST_ADMIN_PASSWORD"
  export LOGIN_RATE_LIMIT_PERMITS=100000
  export TOKEN_CREATE_RATE_LIMIT_PERMITS=100000
  cp -r src/Dependably/bin/Release/net10.0/linux-x64/publish /tmp/dast/app
  chmod +x /tmp/dast/app/Dependably
  /tmp/dast/app/Dependably > app.log 2>&1 &
  APP_PID=$!
  for i in $(seq 1 60); do
    if curl -fsS http://localhost:8080/ready > /dev/null 2>&1; then
      echo "App ready after ${i}s"
      break
    fi
    if ! kill -0 "$APP_PID" 2>/dev/null; then
      echo "App died during startup — log follows:" >&2
      cat app.log >&2
      exit 1
    fi
    sleep 1
  done
  curl -fsS http://localhost:8080/ready || { echo "App not ready after 60s — log follows:" >&2; cat app.log >&2; exit 1; }

# Passive-only baseline scan — fast enough to gate every MR, and the one DAST
# job in the release contract (.release-required). Accepted passive noise is
# enumerated in .zap/baseline.conf; -I is NOT passed, so a new, unaccepted
# finding (a dropped security header, a real passive vuln) turns the pipeline
# red. Triage a genuine new finding into .zap/baseline.conf to re-green.
zap-baseline:
  stage: dast
  extends: [.runs-on-ci, .release-required]
  image:
    name: zaproxy/zap-stable:2.17.0@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074
    entrypoint: [""]
  needs: [build]
  # ZAP image is multi-arch; on a Pi runner Docker pulls the native arm64 variant
  # and the x64 Dependably binary fails with "Exec format error". Pin to amd64
  # runners so the published binary executes natively.
  tags: [amd64]
  script:
    - *zap_app_boot
    # ZAP scripts hardcode base_dir='/zap/wrk/' for report output, but the image
    # ships without that directory (it's the conventional bind-mount target).
    # Symlink it to $PWD so .zap/*.conf is in place and -J/-r land in the build
    # dir where GitLab picks them up as artifacts.
    - ln -sfn "$PWD" /zap/wrk
    - zap-baseline.py -t http://localhost:8080 -c .zap/baseline.conf -J zap-baseline.json -r zap-baseline.html
  after_script:
    - echo "=== dependably app log ==="; cat app.log || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - zap-baseline.html
      - zap-baseline.json
      - app.log

# Full active attack scan — gates every MR and the release. -I is dropped and
# accepted noise lives in .zap/full.conf, so a new active finding (a real
# injection/XSS an agent introduces) reds the pipeline and blocks the merge.
# interruptible so a re-push cancels an in-flight scan instead of stacking work
# on the single amd64 runner it shares with the other gating jobs.
zap-full:
  stage: dast
  extends: [.runs-on-ci, .release-required]
  image:
    name: zaproxy/zap-stable:2.17.0@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074
    entrypoint: [""]
  needs: [build]
  tags: [amd64]
  interruptible: true
  script:
    - *zap_app_boot
    - ln -sfn "$PWD" /zap/wrk
    - zap-full-scan.py -t http://localhost:8080 -c .zap/full.conf -J zap-full.json -r zap-full.html
  after_script:
    - echo "=== dependably app log ==="; cat app.log || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - zap-full.html
      - zap-full.json
      - app.log

# Authenticated API scan of the management surface (/api/v1/...). Imports the
# generated OpenAPI document so ZAP exercises every documented route instead of
# relying on a spider that can't crawl an API. ci/zap-dast-auth.sh logs in,
# clears the first-boot password-rotation flag, and emits a session cookie that
# ZAP's replacer add-on injects on every request. -I is dropped: accepted noise
# is enumerated in .zap/api-management.conf, so the scan goes green when clean
# and red when a new, unaccepted finding appears. Gates every MR and the release
# (.release-required): a new authenticated-API finding blocks the merge so it
# gets fixed in-context. interruptible so a re-push cancels it rather than
# queueing on the single amd64 runner. Management routes accept only the session
# JWT, not a dpd_ token.
zap-api-management:
  stage: dast
  extends: [.runs-on-ci, .release-required]
  image:
    name: zaproxy/zap-stable:2.17.0@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074
    entrypoint: [""]
  needs: [build]
  tags: [amd64]
  interruptible: true
  script:
    - *zap_app_boot
    - sh ci/zap-dast-auth.sh
    - . ./zap-creds.env
    - ln -sfn "$PWD" /zap/wrk
    - >
      ZAP_AUTH_HEADER=Cookie ZAP_AUTH_HEADER_VALUE="$ZAP_SESSION_COOKIE"
      zap-api-scan.py -t http://localhost:8080/openapi/management.json
      -f openapi -O http://localhost:8080
      -c .zap/api-management.conf
      -J zap-api-management.json -r zap-api-management.html
  after_script:
    - echo "=== dependably app log ==="; cat app.log || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - zap-api-management.html
      - zap-api-management.json
      - app.log

# Authenticated API scan of the protocol surfaces (npm/PyPI/NuGet/…). Same
# OpenAPI import; auth is the dpd_ token as a Bearer header — TokenAuthentication
# accepts Bearer for every ecosystem, so one token covers all protocol routes
# (NuGet push via X-NuGet-ApiKey is the one documented gap). -I dropped, gates
# every MR and the release, interruptible — same rationale as zap-api-management.
zap-api-protocol:
  stage: dast
  extends: [.runs-on-ci, .release-required]
  image:
    name: zaproxy/zap-stable:2.17.0@sha256:2ec1d5d5b44d55cfd02ba9b89cd26852f06d92b7fc0ce9f064b9463babc73074
    entrypoint: [""]
  needs: [build]
  tags: [amd64]
  interruptible: true
  script:
    - *zap_app_boot
    - sh ci/zap-dast-auth.sh
    - . ./zap-creds.env
    - ln -sfn "$PWD" /zap/wrk
    - >
      ZAP_AUTH_HEADER_VALUE="Bearer $ZAP_API_TOKEN"
      zap-api-scan.py -t http://localhost:8080/openapi/protocol.json
      -f openapi -O http://localhost:8080
      -c .zap/api-protocol.conf
      -J zap-api-protocol.json -r zap-api-protocol.html
  after_script:
    - echo "=== dependably app log ==="; cat app.log || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - zap-api-protocol.html
      - zap-api-protocol.json
      - app.log

# Single release contract. needs: is the YAML alias *release-required-jobs;
# release-contract-lint reconciles that alias against the set of jobs that
# extend .release-required and fails on drift, every push. The gate itself
# is just a pass-through that release-to-github depends on.
release-gate:
  stage: dast
  extends: .runs-on-release-tag
  image: alpine:3@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
  needs: *release-required-jobs
  script:
    - echo "release contract satisfied for $CI_COMMIT_TAG"

# === release ===

# Mirrors a release tag to GitHub: squashes everything since the previous
# vX.Y.Z tag into one commit on github/main, plus an annotated tag at the
# same SHA. Tag-triggered + serialized + ff-only + drift-detecting +
# provenance-emitting. CI owns tag identity (validate-release-tag);
# this job owns publishing only. See build/release-to-github.sh.
release-to-github:
  stage: release
  extends: .runs-on-release-tag
  needs: [release-gate]
  # See validate-release-tag for why the alpine/git entrypoint is overridden.
  image:
    name: alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
    entrypoint: [""]
  resource_group: github-release
  # Cancellation must not race a partial push.
  interruptible: false
  retry:
    max: 1
    when: [runner_system_failure, stuck_or_timeout_failure]
  variables:
    GIT_DEPTH: 0
  script:
    - apk add --no-cache bash
    - bash build/release-to-github.sh
  artifacts:
    paths:
      - provenance.json
    expire_in: never
    when: on_success
