# ZAP API scan rule overrides for the authenticated protocol surfaces
# (/openapi/protocol.json -> /npm/, /simple/, /nuget/v3/, /v2/, ...).
# Tab-separated: <ruleId> <action> <comment>; action is IGNORE|WARN|FAIL.
# Triaged from the first authenticated main run.

# Basic-auth challenge over plaintext: CI boots the app on HTTP and Basic is the
# wire format NuGet/PyPI clients use; production terminates TLS at the proxy.
10105	IGNORE	(Weak auth - Basic is by-spec; CI is plain HTTP, prod is HTTPS)
# Error bodies are application/problem+json where ZAP expects another type.
100001	IGNORE	(Unexpected Content-Type on problem+json error responses)
# Cross-Origin-Resource-Policy not required for package-manager clients.
90004	IGNORE	(CORP header absent on artifact/index responses - accepted)
# 4xx from schema-fuzzed probes and unauthorized sub-resources - coverage noise.
100000	IGNORE	(Client Error 4xx returned - expected API-scan probe result)
10049	IGNORE	(Storable/Non-Storable Content - informational)
10104	IGNORE	(User Agent Fuzzer - informational active-scan probe)
# npm search (/npm/-/v1/search?text=...) uses Dapper parameterized queries; ZAP
# active-scan SQL injection probe gets a 200 from the LIKE filter and false-positives.
40018	IGNORE	(SQL Injection - npm search uses Dapper parameterized queries; active-scan FP)
# Note: 10038 (CSP not set on /simple/) is fixed in SecurityHeadersMiddleware and
# is intentionally NOT ignored here, so it gates if it ever regresses.
