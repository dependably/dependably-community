# ZAP API scan rule overrides for the authenticated management API
# (/openapi/management.json -> /api/v1/...).
# Tab-separated: <ruleId> <action> <comment>; action is IGNORE|WARN|FAIL.
# Triaged from the first authenticated main run.

# Operator user-search passes an email filter as a query param. Emails are not
# credentials, and the flagged value is ZAP's own injected probe, not a leak.
10024	IGNORE	(Email in URL - search filter, not a secret)
# Error bodies are application/problem+json where ZAP expects another type.
100001	IGNORE	(Unexpected Content-Type on problem+json error responses)
# Cross-Origin-Resource-Policy not required for the JSON management API.
90004	IGNORE	(CORP header absent - accepted)
# 4xx from schema-fuzzed probes and system-admin-only routes (owner gets 403).
100000	IGNORE	(Client Error 4xx returned - expected API-scan probe result)
10049	IGNORE	(Storable/Non-Storable Content - informational)
10104	IGNORE	(User Agent Fuzzer - informational active-scan probe)
10111	IGNORE	(Authentication Request Identified - informational, login form)
