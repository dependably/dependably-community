# ZAP baseline scan rule overrides — one rule per line, TAB-separated:
#   <ruleId>	IGNORE|WARN|FAIL	(comment)
# Triaged from the passive baseline scan of the SPA + unauthenticated routes.
# With these accepted, zap-baseline runs without -I, so any NEW finding (a
# dropped security header, a real passive vuln) turns the pipeline red. The
# expected security headers (CSP, X-Content-Type-Options, X-Frame-Options, HSTS)
# are set by SecurityHeadersMiddleware and so are absent from this list — if one
# regresses it surfaces as a new, unaccepted finding.

# Spectre cross-origin isolation headers (COEP/COOP/CORP). Not required for a
# same-origin SPA + package-registry API; CORP absence is accepted on the
# authenticated API scans too (.zap/api-*.conf).
90004	IGNORE	(Cross-origin isolation headers - not required for this app)
# ZAP flags any 10-digit integer as a possible Unix timestamp - false positive
# on sizes/ids/version numbers in JSON and bundle assets, not a real leak.
10096	IGNORE	(Timestamp Disclosure - numeric false positive)
# Informational fingerprint, not a finding.
10109	IGNORE	(Modern Web Application - informational)
# Informational cache-header observation.
10049	IGNORE	(Storable and Cacheable Content - informational)
