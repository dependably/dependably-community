name: Secret Scan (Deep)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  secret-scan-deep:
    name: Secret Scan (full history, unverified)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --exclude-paths=.trufflehog-exclude
