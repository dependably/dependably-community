name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  unit-and-compliance:
    name: Unit, Compliance & Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerable packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/vuln.txt && ! grep -q "has the following vulnerable packages" /tmp/vuln.txt

      - name: Build (with SecurityCodeScan Roslyn analyzer — fails on SQL injection patterns)
        run: dotnet build --no-restore -c Release

      - name: Check for string interpolation in Dapper calls (SQL injection prevention)
        run: |
          # Match actual Dapper method-call sites: ".Execute*(" / ".Execute*<" /
          # ".Query*(" / ".Query*<". Anchoring on the leading '.' and a trailing
          # '(' or '<' avoids false positives on substrings like "SearchQueryService".
          if grep -rnE '\.(Execute|Query)[A-Za-z]*\s*[(<]' src/ --include="*.cs" | grep -E '\$"|\$@"'; then
            echo "ERROR: String interpolation detected in a potential Dapper query call."
            exit 1
          fi

      # SchemaPostgres tests require a live Postgres (TEST_POSTGRES_CONNECTION) and throw loudly
      # without one — they run only in GitLab's dedicated schema-integrity job. Exclude them here
      # so the offline unit suite stays green, matching the test class's stated design intent.
      - name: Test (unit + compliance + security)
        run: dotnet test --no-build -c Release --verbosity normal --filter "Category!=Integration&Category!=SchemaPostgres" --collect:"XPlat Code Coverage"

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: unit-coverage
          path: '**/TestResults/**/coverage.cobertura.xml'

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    # Skip when there's no prior commit to diff against (initial push,
    # force-push of a new branch). The scheduled deep scan in
    # secret-scan-deep.yml covers full-history scanning in those cases.
    if: github.event_name == 'pull_request' || github.event.before != '0000000000000000000000000000000000000000'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Lint CSS
        run: npm run lint:css
        working-directory: web

      - name: Type-check (svelte-check)
        run: npm run check
        working-directory: web

      - name: Chrome emoji guard
        run: |
          if grep -rPn '[\x{1F300}-\x{1FAFF}\x{2600}-\x{27BF}\x{2700}-\x{27BF}\x{2300}-\x{23FF}]' web/src --include='*.svelte'; then
            echo "Emoji codepoint detected in web/src. Use a sprite from web/public/icons.svg instead — DESIGN.md §11." >&2
            exit 1
          fi

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Integration Tests
        run: dotnet test --no-build -c Release --verbosity normal --filter "Category=Integration" --collect:"XPlat Code Coverage"

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: integration-coverage
          path: '**/TestResults/**/coverage.cobertura.xml'

  sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Generate backend SBOM
        run: dotnet CycloneDX src/Dependably/Dependably.csproj -o . -fn sbom-backend.json -F json -spv 1.6 --exclude-dev

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Generate frontend SBOM
        run: npm run sbom
        working-directory: web

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: sboms
          path: |
            sbom-backend.json
            web/sbom-frontend.json

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [unit-and-compliance, integration, frontend-lint, sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write # push image to ghcr.io
      id-token: write # OIDC token for keyless sigstore signing
      attestations: write # store the build-provenance attestation on the repo
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/dependably:latest
            ghcr.io/${{ github.repository_owner }}/dependably:${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64

      # Signed SLSA build provenance over the pushed image, by digest (keyless
      # OIDC/sigstore — no stored key). push-to-registry attaches the attestation
      # alongside the image so consumers can verify it by digest. This raises the
      # released image from SLSA Build L0 to L2. Verify with:
      #   gh attestation verify oci://ghcr.io/<owner>/dependably:<tag> -R <owner>/dependably
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/dependably
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
